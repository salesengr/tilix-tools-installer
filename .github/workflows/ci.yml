name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  shell-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lint tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt

      - name: Bash syntax check
        run: |
          find . -name '*.sh' -print0 | xargs -0 -n1 bash -n

      - name: Shellcheck
        run: |
          find . -name '*.sh' -print0 | xargs -0 shellcheck

      - name: shfmt check (advisory)
        run: |
          shfmt -d . || true

      - name: Prepare XDG environment for smoke test
        run: |
          bash xdg_setup.sh

      - name: Installer dry-run smoke
        run: |
          bash install_security_tools.sh --dry-run all

      - name: Install Node for audit coverage step
        run: |
          sudo apt-get install -y nodejs npm

      - name: Node security audit coverage (advisory)
        run: |
          scripts/node_security_audit.sh node-audit-report.json || true

      - name: Upload node audit report
        uses: actions/upload-artifact@v4
        with:
          name: node-audit-report
          path: node-audit-report.json
