name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  shell-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lint tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shfmt

      - name: Bash syntax check
        run: |
          find . -name '*.sh' -print0 | xargs -0 -n1 bash -n

      - name: Shellcheck
        run: |
          find . -name '*.sh' -print0 | xargs -0 shellcheck --exclude=SC1090,SC1091

      - name: shfmt check
        run: |
          shfmt -d .

      - name: Prepare XDG environment for smoke test
        run: |
          bash xdg_setup.sh

      - name: Installer dry-run smoke
        run: |
          # Source .bashrc so XDG env vars set by xdg_setup.sh are available
          # shellcheck disable=SC1090
          source ~/.bashrc || true
          bash install_security_tools.sh --dry-run all

      - name: Install Node for audit coverage step
        run: |
          sudo apt-get install -y nodejs npm

      - name: Node security audit coverage
        run: |
          scripts/node_security_audit.sh node-audit-report.json

      - name: Upload node audit report
        uses: actions/upload-artifact@v4
        with:
          name: node-audit-report
          path: node-audit-report.json

  docker-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - category: domain-tools
            flag: --domain-tools
          - category: recon-tools
            flag: --recon-tools
          - category: cti-tools
            flag: --cti-tools
    steps:
      - uses: actions/checkout@v4
      - name: Install ${{ matrix.category }} in Docker
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            ubuntu:22.04 \
            bash -c "
              cd /repo && bash xdg_setup.sh && source ~/.bashrc || true
              bash install_security_tools.sh ${{ matrix.flag }}
            "
